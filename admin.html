<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vonza Admin</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .agent {
      margin-top: 16px;
      padding: 16px;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      background: white;
    }

    .muted {
      color: #475569;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>Admin Dashboard</h1>
    <p id="status" class="muted">Loading agents...</p>
    <div id="agent-list"></div>
  </main>

  <script>
    const statusEl = document.getElementById("status");
    const agentListEl = document.getElementById("agent-list");
    const token = new URLSearchParams(window.location.search).get("token");

    async function loadAgents() {
      try {
        const url = new URL("/agents/admin-list", window.location.origin);
        url.searchParams.set("token", token || "");
        const response = await fetch(url.toString());
        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || "Failed to load agents.");
        }

        const agents = data.agents || [];
        statusEl.textContent = `${agents.length} agent${agents.length === 1 ? "" : "s"} found`;

        agentListEl.innerHTML = agents.map((agent) => `
          <section class="agent">
            <h2>${agent.assistantName || agent.name}</h2>
            <p class="muted">${agent.websiteUrl || "No website URL"}</p>
            <p class="muted">agent_key: ${agent.publicAgentKey || "-"}</p>
            <p class="muted">client_id: ${agent.clientId || "-"}</p>
            <p class="muted">messages: ${agent.messageCount || 0}</p>
            <p class="muted">last message: ${agent.lastMessageAt || "-"}</p>
          </section>
        `).join("");
      } catch (error) {
        statusEl.textContent = error.message || "Failed to load agents.";
        agentListEl.innerHTML = "";
      }
    }

    loadAgents();
  </script>
</body>
</html>
