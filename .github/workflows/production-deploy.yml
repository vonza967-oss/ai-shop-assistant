name: Production Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: production-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: vonza_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d vonza_ci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      CLEAN_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/vonza_ci
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run smoke tests
        run: npm run test:smoke

      - name: Check schema sync and migration contract
        run: npm run check:schema-sync

      - name: Validate clean database from supabase migrations
        run: npm run validate:clean-db

      # TODO: Reintroduce Supabase CLI linking and production migration automation
      # once production database credentials are configured correctly.

      - name: Trigger Render deploy
        run: curl --fail --silent --show-error --request POST "$RENDER_DEPLOY_HOOK_URL"
