<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vonza AI Widget Generator</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: rgba(15, 23, 42, 0.88);
      --panel-border: rgba(255, 255, 255, 0.08);
      --text: #f8fafc;
      --muted: #94a3b8;
      --accent: #10a37f;
      --accent-strong: #0f766e;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(16, 163, 127, 0.16), transparent 28%),
        radial-gradient(circle at top right, rgba(59, 130, 246, 0.12), transparent 26%),
        linear-gradient(180deg, #0b1220 0%, #111827 100%);
    }

    .card {
      width: min(100%, 640px);
      padding: 32px;
      border-radius: 24px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(20px);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 2rem;
      letter-spacing: -0.04em;
    }

    p {
      margin: 0 0 24px;
      color: var(--muted);
      line-height: 1.6;
    }

    label {
      display: block;
      margin-bottom: 10px;
      font-size: 0.92rem;
      font-weight: 600;
    }

    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      background: rgba(15, 23, 42, 0.9);
      color: var(--text);
      font: inherit;
    }

    input,
    select {
      padding: 15px 16px;
      margin-bottom: 16px;
    }

    textarea {
      min-height: 130px;
      padding: 16px;
      resize: vertical;
      margin-top: 18px;
    }

    button {
      border: none;
      border-radius: 16px;
      padding: 14px 18px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform 160ms ease, opacity 160ms ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      color: white;
    }

    .secondary {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
    }

    .success {
      margin-top: 12px;
      min-height: 1.2em;
      color: #6ee7b7;
      font-size: 0.92rem;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Vonza AI Widget Generator</h1>
    <p>Generate an install script for your client in one step.</p>

    <label for="business-name" id="business-name-label">Business Name</label>
    <input id="business-name" type="text" placeholder="e.g. Client One">

    <label for="identifier-type">Identifier Type</label>
    <select id="identifier-type">
      <option value="agent_key" selected>Agent Key</option>
      <option value="agent_id">Agent ID</option>
    </select>

    <div class="row">
      <button id="generate-button" class="primary" type="button">Generate Script</button>
      <button id="copy-button" class="secondary" type="button">Copy</button>
    </div>

    <textarea id="output" readonly placeholder="Your script tag will appear here"></textarea>
    <div id="success-message" class="success"></div>
  </main>

  <script>
    const input = document.getElementById("business-name");
    const identifierType = document.getElementById("identifier-type");
    const inputLabel = document.getElementById("business-name-label");
    const output = document.getElementById("output");
    const successMessage = document.getElementById("success-message");

    function buildBusinessId(value) {
      return value.trim().toLowerCase().replace(/\s+/g, "_");
    }

    function syncInputMode() {
      if (identifierType.value === "agent_id") {
        inputLabel.textContent = "Agent ID";
        input.placeholder = "e.g. 11111111-2222-3333-4444-555555555555";
      } else {
        inputLabel.textContent = "Business Name";
        input.placeholder = "e.g. Client One";
      }
    }

    function generateScript() {
      const identifierValue = identifierType.value === "agent_id"
        ? input.value.trim()
        : buildBusinessId(input.value);
      const identifierAttribute = identifierType.value === "agent_id"
        ? "data-agent-id"
        : "data-agent-key";

      if (!identifierValue) {
        output.value = "";
        successMessage.textContent = "Enter a business name first.";
        return;
      }

      output.value = `<script src="https://ai-shop-assistant-1.onrender.com/embed.js" ${identifierAttribute}="${identifierValue}"><\/script>`;
      successMessage.textContent = "";
    }

    async function copyScript() {
      if (!output.value) {
        successMessage.textContent = "Generate a script first.";
        return;
      }

      try {
        await navigator.clipboard.writeText(output.value);
        successMessage.textContent = "Copied to clipboard.";
      } catch {
        output.select();
        document.execCommand("copy");
        successMessage.textContent = "Copied to clipboard.";
      }
    }

    document.getElementById("generate-button").addEventListener("click", generateScript);
    document.getElementById("copy-button").addEventListener("click", copyScript);
    identifierType.addEventListener("change", syncInputMode);
    syncInputMode();
  </script>
</body>
</html>
