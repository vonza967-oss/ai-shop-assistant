name: Production Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: production-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: vonza_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d vonza_ci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      CLEAN_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/vonza_ci
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run smoke tests
        run: npm run test:smoke

      - name: Check schema sync and migration contract
        run: npm run check:schema-sync

      - name: Validate clean database from supabase migrations
        run: npm run validate:clean-db

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link production Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD"

      - name: Apply production migrations
        run: supabase db push --linked --include-all --password "$SUPABASE_DB_PASSWORD"

      - name: Confirm applied migration versions
        run: |
          supabase migration list --linked --password "$SUPABASE_DB_PASSWORD" | tee supabase-migration-list.txt
          node scripts/assert-linked-migration-state.js supabase-migration-list.txt

      - name: Trigger Render deploy
        run: curl --fail --silent --show-error --request POST "$RENDER_DEPLOY_HOOK_URL"
